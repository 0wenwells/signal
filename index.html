<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Signal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>

/* ============================================================
   THE SIGNAL — Student Page
   ============================================================
   DESIGN TOKENS
   Edit the variables in this block to restyle the whole page.
   ============================================================ */

:root {
  /* Typography */
  --font-sans:        'DM Sans', system-ui, sans-serif;
  --font-mono:        'DM Mono', 'Courier New', monospace;

  /* Core palette */
  --c-ink:            #1a1916;   /* primary text + borders */
  --c-paper:          #f5f3ee;   /* page background */
  --c-mid:            #7a7870;   /* secondary / muted text */
  --c-rule:           #d8d5ce;   /* divider lines */

  /* Strand accent colours */
  --c-strand-a:       #1a1916;   /* AI & Industry */
  --c-strand-b:       #2d5a3d;   /* Environmental cost */
  --c-strand-c:       #8b2e12;   /* Creative opposition */

  /* Layout */
  --max-width:        860px;
  --page-padding:     28px;
}

/* ============================================================
   RESET & BASE
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-sans);
  background: var(--c-paper);
  color: var(--c-ink);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; }
a:hover { opacity: 0.7; }

.page {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 var(--page-padding);
}

/* ============================================================
   MASTHEAD
   ============================================================ */

.masthead {
  border-bottom: 1.5px solid var(--c-ink);
  padding: 24px 0 16px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}

.pub-name {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--c-mid);
  margin-bottom: 4px;
}

.masthead h1 {
  font-family: var(--font-sans);
  font-size: 34px;
  font-weight: 300;
  letter-spacing: -0.025em;
  line-height: 1;
}

.masthead h1 em { font-style: italic; }

.masthead-right { text-align: right; flex-shrink: 0; }

.week-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--c-mid);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.signal-count {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 500;
  line-height: 1;
}

.signal-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--c-mid);
  letter-spacing: 0.05em;
}

/* ============================================================
   STRAND NAVIGATION
   ============================================================ */

.strand-nav {
  display: flex;
  border-bottom: 0.5px solid var(--c-rule);
}

.strand-tab {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 12px 20px 12px 0;
  cursor: pointer;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -0.5px;
  color: var(--c-mid);
  background: none;
  transition: color 0.15s;
  display: flex;
  align-items: center;
  gap: 7px;
}

.strand-tab:hover { color: var(--c-ink); }

.strand-tab.active {
  color: var(--strand-color);
  border-bottom-color: var(--strand-color);
}

.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.dot-a { background: var(--c-strand-a); }
.dot-b { background: var(--c-strand-b); }
.dot-c { background: var(--c-strand-c); }

/* ============================================================
   PANELS & ITEMS
   ============================================================ */

.panel { display: none; padding: 24px 0 48px; }
.panel.active { display: block; }

.items-list { display: flex; flex-direction: column; }

.item {
  padding: 18px 0;
  border-bottom: 0.5px solid var(--c-rule);
  display: grid;
  grid-template-columns: 52px 1fr 72px;
  gap: 0 16px;
  align-items: start;
}

.item-num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--c-mid);
  padding-top: 2px;
}

.item-source {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--c-mid);
  margin-bottom: 4px;
}

.item-headline {
  font-size: 16px;
  font-weight: 400;
  line-height: 1.35;
  margin-bottom: 6px;
}

.item-headline a { text-decoration: none; }
.item-headline a:hover { text-decoration: underline; text-underline-offset: 3px; opacity: 1; }

.item-summary {
  font-size: 13px;
  color: var(--c-mid);
  line-height: 1.55;
}

.item-date {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--c-mid);
  white-space: nowrap;
  text-align: right;
  padding-top: 2px;
}

.state-msg {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--c-mid);
  padding: 40px 0;
  letter-spacing: 0.06em;
}

/* ============================================================
   FOOTER
   ============================================================ */

.site-footer {
  border-top: 1.5px solid var(--c-ink);
  padding: 14px 0 28px;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

.footer-note {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--c-mid);
  letter-spacing: 0.06em;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */

@media (max-width: 600px) {
  :root { --page-padding: 16px; }
  .masthead { flex-direction: column; align-items: flex-start; }
  .masthead-right { text-align: left; }
  .item { grid-template-columns: 36px 1fr; }
  .item-date { display: none; }
  .strand-tab { font-size: 9px; padding-right: 12px; }
}

</style>
</head>
<body>
<div class="page">

  <header class="masthead">
    <div>
      <div class="pub-name">BA Graphic &amp; Media Design</div>
      <h1>The <em>Signal</em></h1>
    </div>
    <div class="masthead-right">
      <div class="week-label" id="week-label">—</div>
      <div class="signal-count" id="signal-count">—</div>
      <div class="signal-label">approved items</div>
    </div>
  </header>

  <nav class="strand-nav">
    <button class="strand-tab active" data-strand="a" style="--strand-color: var(--c-strand-a)" onclick="switchTab('a',this)">
      <span class="dot dot-a" aria-hidden="true"></span>AI &amp; industry
    </button>
    <button class="strand-tab" data-strand="b" style="--strand-color: var(--c-strand-b)" onclick="switchTab('b',this)">
      <span class="dot dot-b" aria-hidden="true"></span>Environmental cost
    </button>
    <button class="strand-tab" data-strand="c" style="--strand-color: var(--c-strand-c)" onclick="switchTab('c',this)">
      <span class="dot dot-c" aria-hidden="true"></span>Creative opposition
    </button>
  </nav>

  <main>
    <div class="panel active" id="panel-a"><div class="items-list" id="list-a"></div></div>
    <div class="panel"        id="panel-b"><div class="items-list" id="list-b"></div></div>
    <div class="panel"        id="panel-c"><div class="items-list" id="list-c"></div></div>
  </main>

  <footer class="site-footer">
    <span class="footer-note">Updated weekly · Curated for BA Graphic &amp; Media Design</span>
    <span class="footer-note" id="last-updated"></span>
  </footer>

</div>
<script>
const CONTENT_URL = './content.json';

async function loadContent() {
  try {
    const res = await fetch(CONTENT_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error();
    render(await res.json());
  } catch {
    ['a','b','c'].forEach(s =>
      document.getElementById('list-' + s).innerHTML =
        '<p class="state-msg">Content unavailable — check back soon.</p>'
    );
  }
}

function render(data) {
  const now = new Date();
  document.getElementById('week-label').textContent =
    'Week of ' + now.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });

  const all = [...(data.a||[]), ...(data.b||[]), ...(data.c||[])];
  document.getElementById('signal-count').textContent =
    all.filter(i => i.status === 'approved').length;

  if (data.lastUpdated) {
    const d = new Date(data.lastUpdated);
    document.getElementById('last-updated').textContent =
      'Last updated ' + d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  }

  ['a','b','c'].forEach(strand => {
    const items = (data[strand]||[]).filter(i => i.status === 'approved');
    const list  = document.getElementById('list-' + strand);
    if (!items.length) {
      list.innerHTML = '<p class="state-msg">No items approved for this week yet.</p>';
      return;
    }
    list.innerHTML = items.map((item, i) => `
      <article class="item">
        <div class="item-num">0${i+1}</div>
        <div>
          <div class="item-source">${esc(item.source)}</div>
          <h2 class="item-headline">${item.url
            ? `<a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.headline)}</a>`
            : esc(item.headline)}</h2>
          <p class="item-summary">${esc(item.summary)}</p>
        </div>
        <div class="item-date">${esc(item.date)}</div>
      </article>`).join('');
  });
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function switchTab(strand, btn) {
  document.querySelectorAll('.strand-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + strand).classList.add('active');
}

loadContent();
</script>
</body>
</html>
