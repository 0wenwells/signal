<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Signal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>

/* ============================================================
   THE SIGNAL — Student Page
   ============================================================
   DESIGN TOKENS
   Edit the variables in this block to restyle the whole page.
   ============================================================ */

:root {
  /* Typography */
  --font-sans:        'DM Sans', system-ui, sans-serif;
  --font-mono:        'DM Mono', 'Courier New', monospace;

  /* Core palette */
  --c-ink:            #1a1916;
  --c-paper:          #f5f3ee;
  --c-mid:            #7a7870;
  --c-rule:           #d8d5ce;

  /* Strand accent colours */
  --c-strand-a:       #1a1916;   /* AI & Creative Industry */
  --c-strand-b:       #2d5a3d;   /* Environmental cost */
  --c-strand-c:       #8b2e12;   /* Creative opposition */

  /* Layout */
  --max-width:        1200px;
  --page-padding:     28px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-sans);
  background: var(--c-paper);
  color: var(--c-ink);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; }
a:hover { opacity: 0.7; }

.page {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 var(--page-padding);
}

/* ============================================================
   MASTHEAD
   ============================================================ */

.masthead {
  border-bottom: 1.5px solid var(--c-ink);
  padding: 24px 0 16px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}

.pub-name {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--c-mid);
  margin-bottom: 4px;
}

.masthead h1 {
  font-size: 34px;
  font-weight: 300;
  letter-spacing: -0.025em;
  line-height: 1;
}

.masthead h1 em { font-style: italic; }

.masthead-right { text-align: right; flex-shrink: 0; }

.week-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--c-mid);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.signal-count {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 500;
  line-height: 1;
}

.signal-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--c-mid);
  letter-spacing: 0.05em;
}

/* ============================================================
   THREE COLUMN GRID
   ============================================================ */

.columns {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
  border-bottom: 1.5px solid var(--c-ink);
}

/* ============================================================
   COLUMN HEADERS
   ============================================================ */

.col-header {
  padding: 14px 20px 12px 0;
  border-bottom: 2px solid var(--strand-color);
  display: flex;
  align-items: center;
  gap: 8px;
}

.col-header + .col-header {
  padding-left: 20px;
  border-left: 0.5px solid var(--c-rule);
}

.col-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--strand-color);
  font-weight: 500;
}

.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--strand-color);
}

/* ============================================================
   COLUMN BODIES
   ============================================================ */

.col-body {
  padding: 0 20px 32px 0;
  border-top: none;
}

.col-body + .col-body {
  padding-left: 20px;
  border-left: 0.5px solid var(--c-rule);
}

/* ============================================================
   ITEMS
   ============================================================ */

.item {
  padding: 16px 0;
  border-bottom: 0.5px solid var(--c-rule);
}

.item-source {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--c-mid);
  margin-bottom: 4px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.item-date {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--c-rule);
}

.item-headline {
  font-size: 14px;
  font-weight: 400;
  line-height: 1.35;
  margin-bottom: 6px;
}

.item-headline a { text-decoration: none; }
.item-headline a:hover {
  text-decoration: underline;
  text-underline-offset: 3px;
  opacity: 1;
}

.item-summary {
  font-size: 12px;
  color: var(--c-mid);
  line-height: 1.55;
}

.state-msg {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--c-mid);
  padding: 32px 0;
  letter-spacing: 0.06em;
}

/* ============================================================
   FOOTER
   ============================================================ */

.site-footer {
  padding: 14px 0 28px;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

.footer-note {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--c-mid);
  letter-spacing: 0.06em;
}

/* ============================================================
   RESPONSIVE — collapse to tabs on narrow screens
   ============================================================ */

@media (max-width: 800px) {
  :root { --page-padding: 16px; }

  .columns { grid-template-columns: 1fr; border-bottom: none; }

  .col-header { border-bottom: none; border-top: 1.5px solid var(--c-ink); padding-left: 0; }
  .col-header + .col-header { border-left: none; padding-left: 0; }

  .col-body { padding-left: 0; }
  .col-body + .col-body { border-left: none; }

  .masthead { flex-direction: column; align-items: flex-start; }
  .masthead-right { text-align: left; }
}

</style>
</head>
<body>
<div class="page">

  <header class="masthead">
    <div>
      <div class="pub-name">BA Graphic &amp; Media Design</div>
      <h1>The <em>Signal</em></h1>
    </div>
    <div class="masthead-right">
      <div class="week-label" id="week-label">—</div>
      <div class="signal-count" id="signal-count">—</div>
      <div class="signal-label">items this week</div>
    </div>
  </header>

  <main>
    <div class="columns">

      <!-- Column A header -->
      <div class="col-header" style="--strand-color: var(--c-strand-a)">
        <span class="dot"></span>
        <span class="col-label">AI &amp; Creative Industry</span>
      </div>
      <!-- Column B header -->
      <div class="col-header" style="--strand-color: var(--c-strand-b)">
        <span class="dot"></span>
        <span class="col-label">Environmental Cost</span>
      </div>
      <!-- Column C header -->
      <div class="col-header" style="--strand-color: var(--c-strand-c)">
        <span class="dot"></span>
        <span class="col-label">Creative Opposition</span>
      </div>

      <!-- Column A body -->
      <div class="col-body">
        <div id="list-a"></div>
      </div>
      <!-- Column B body -->
      <div class="col-body">
        <div id="list-b"></div>
      </div>
      <!-- Column C body -->
      <div class="col-body">
        <div id="list-c"></div>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <span class="footer-note">Updated weekly · Curated for BA Graphic &amp; Media Design</span>
    <span class="footer-note" id="last-updated"></span>
  </footer>

</div>
<script>
const CONTENT_URL = './content.json';

async function loadContent() {
  try {
    const res = await fetch(CONTENT_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error();
    render(await res.json());
  } catch {
    ['a','b','c'].forEach(s =>
      document.getElementById('list-' + s).innerHTML =
        '<p class="state-msg">Content unavailable — check back soon.</p>'
    );
  }
}

function render(data) {
  const now = new Date();
  document.getElementById('week-label').textContent =
    'Week of ' + now.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });

  const all = [...(data.a||[]), ...(data.b||[]), ...(data.c||[])];
  document.getElementById('signal-count').textContent =
    all.filter(i => i.status === 'approved').length;

  if (data.lastUpdated) {
    const d = new Date(data.lastUpdated);
    document.getElementById('last-updated').textContent =
      'Last updated ' + d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  }

  ['a','b','c'].forEach(strand => {
    const items = (data[strand]||[]).filter(i => i.status === 'approved');
    const list  = document.getElementById('list-' + strand);
    if (!items.length) {
      list.innerHTML = '<p class="state-msg">No items this week yet.</p>';
      return;
    }
    list.innerHTML = items.map((item, i) => `
      <article class="item">
        <div class="item-source">
          <span>${esc(item.source)}</span>
          <span class="item-date">${esc(item.date)}</span>
        </div>
        <h2 class="item-headline">${item.url
          ? `<a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.headline)}</a>`
          : esc(item.headline)}</h2>
        <p class="item-summary">${esc(item.summary)}</p>
      </article>`).join('');
  });
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadContent();
</script>
</body>
</html>
